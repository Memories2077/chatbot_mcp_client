services:
  # Backend Service - FastAPI
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - BACKEND_PORT=${BACKEND_PORT:-8000}
    container_name: chatbot-backend
    env_file:
      - .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PYTHONUNBUFFERED=1
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      # Compatibility fallback for older env files; backend prefers BACKEND_PORT.
      - NEXT_PUBLIC_BACKEND_PORT=${BACKEND_PORT:-8000}
      # Backend/container URLs. Do not expose these as NEXT_PUBLIC_* browser config.
      - LANGGRAPH_API_URL=http://agent-service:2024
      - MCP_GEN_URL=http://docker-manager:8080
      - MONGODB_URL=mongodb://mongodb:27017
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import requests,sys; r=requests.get(''http://localhost:${BACKEND_PORT:-8000}/health''); sys.exit(0 if 200 <= r.status_code < 400 else 1)"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: uvicorn main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8000}
    restart: unless-stopped
    networks:
      - chatbot-network
      - mcp-network
    volumes:
      - ./backend:/app/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Frontend Service - Next.js
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Browser-facing URL embedded into the Next.js bundle.
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    container_name: chatbot-frontend
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
      - NODE_ENV=production
    ports:
      - "9002:9002"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:9002'', res=>{ process.exit((res.statusCode>=200 && res.statusCode<400)?0:1) })"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - chatbot-network
      - mcp-network
    volumes:
      - ./src:/app/src
      - ./public:/app/public

networks:
  chatbot-network:
    driver: bridge
  mcp-network:
    external: true

volumes:
  backend-data:
